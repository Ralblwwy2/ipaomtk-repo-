name: Auto Refresh IPAOMTK Database

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  refresh-repository:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Runtime Script Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Execute Scraping Pipeline
      run: |
        if [ -f "scraper.py" ]; then
          python scraper.py
        else
          echo "ERROR: scraper.py not found in the root directory!"
          exit 1
        fi

    - name: Commit and Sync Generated Source Map
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Ensure file exists before adding
        if [ -f "repo.json" ]; then
          git add repo.json
          if ! git diff --cached --quiet; then
            git commit -m "Automated Sync: Database definitions updated"
            git push origin main
          else
            echo "No changes detected."
          fi
        else
          echo "repo.json was not generated by the script."
          exit 1
        fi
